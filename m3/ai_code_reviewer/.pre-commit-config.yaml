repos:
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
  - repo: local
    hooks:
      - id: ai-review
        name: Run AI Code Review
        entry: python -m ai_code_reviewer.main scan .
        language: system
        pass_filenames: false

